<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Rooster Settings</title>
		<link rel="stylesheet" href="rooster.css">
		<script type="application/javascript" src="settings.js"></script>
	</head>
	<body>
		<div>
			<div class="listbox">
				<span class="listbox-header">Receive notifications from</span>
				<div class="listbox-content" id="receive-notifications">
					<div class="listbox-item user-entry" id="user-entry-template">
						<span></span>
						<input type="button" value="-">
					</div>
				</div>
				<div class="listbox-footer">
					<form id="input-username-form">
						<input type="text" placeholder="Username" id="input-username" autocomplete="off">
						<input type="submit" value="+">
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
